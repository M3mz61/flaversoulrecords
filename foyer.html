<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foyer — Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .header-group {
            text-align: center;
            margin-bottom: 70px;
        }
        .main-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.2rem;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }
        .sub-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: normal;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin: 0;
        }
        .gallery-wall {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 45px;
            width: 100%;
            max-width: 1200px;
            justify-items: center;
            align-content: center;
        }
        .room-frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
        }
        .room-frame:hover {
            transform: translateY(-8px);
        }
        .disc-icon {
            width: 160px;
            height: 160px;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            margin-bottom: 25px;
            transition: box-shadow 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.06);
        }
        
        .disc-gold { background-image: url('gold.jpeg'); }
        .room-frame:hover .disc-gold { box-shadow: 0 15px 30px rgba(212,175,55,0.4); }

        .disc-silver { background-image: url('silver.jpeg'); }
        .room-frame:hover .disc-silver { box-shadow: 0 15px 30px rgba(170,170,170,0.4); }

        .disc-platinum { background-image: url('platinum.jpeg'); }
        .room-frame:hover .disc-platinum { box-shadow: 0 15px 30px rgba(200,220,230,0.4); }

        .disc-bronze { background-image: url('bronze.jpeg'); }
        .room-frame:hover .disc-bronze { box-shadow: 0 15px 30px rgba(210,105,30,0.35); }

        /* Fixed to display your real textured rock asset instead of pink vector */
        .disc-granite { background-image: url('rock.jpeg'); }
        .room-frame:hover .disc-granite { box-shadow: 0 15px 30px rgba(215,90,118,0.4); }

        .disc-concrete { background-image: url('concrete.jpeg'); }
        .room-frame:hover .disc-concrete { box-shadow: 0 15px 30px rgba(120,120,120,0.4); }

        .room-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-align: center;
        }
        .room-status {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.75rem;
            color: #888888;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-group">
        <h1 class="main-title">Flave R Soul Records</h1>
        <h2 class="sub-title">The Foyer</h2>
    </div>

    <div class="gallery-wall">

        <a href="gold-room.html" class="room-frame">
            <div class="disc-icon disc-gold"></div>
            <span class="room-title">Gold Room</span>
            <span class="room-status">Mainstream Hits</span>
        </a>

        <a href="silver-room.html" class="room-frame">
            <div class="disc-icon disc-silver"></div>
            <span class="room-title">Silver Room</span>
            <span class="room-status">Soul Music</span>
        </a>

        <a href="platinum-room.html" class="room-frame">
            <div class="disc-icon disc-platinum"></div>
            <span class="room-title">Platinum Room</span>
            <span class="room-status">Dance Music</span>
        </a>

        <a href="bronze-room.html" class="room-frame">
            <div class="disc-icon disc-bronze"></div>
            <span class="room-title">Bronze Room</span>
            <span class="room-status">Spanish Catalog</span>
        </a>

        <a href="rock-room.html" class="room-frame">
            <div class="disc-icon disc-granite"></div>
            <span class="room-title">Granite Room</span>
            <span class="room-status">Rock Music</span>
        </a>

        <a href="concrete-room.html" class="room-frame">
            <div class="disc-icon disc-concrete"></div>
            <span class="room-title">Concrete Room</span>
            <span class="room-status">Urban Music</span>
        </a>

    </div>

</body>
</html>
