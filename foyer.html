<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foyer</title>
    <style>
        body {
            background-color: #ffffff !important; /* Pure white background */
            margin: 0;
            padding: 40px;
        }
        
        .grid-container {
            display: grid;
            /* Perfectly symmetric 4-column landscape layout for iPad */
            grid-template-columns: repeat(4, 1fr); 
            gap: 30px; /* Clean spacing between image discs */
            max-width: 100%;
            margin: 0 auto;
        }

        .grid-link {
            display: block;
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        .grid-link:hover {
            transform: translateY(-2px);
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain; /* Keeps all circle discs perfectly round */
        }

        /* Adjusts to 2 columns if the iPad is turned vertically */
        @media (max-width: 1024px) and (orientation: portrait) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <!-- Row 1 -->
        <a href="studio.html" class="grid-link"><img src="studio.jpeg" alt="Studio Hire"></a>
        <a href="platinum-room.html" class="grid-link"><img src="platinum.jpeg" alt="Platinum Room"></a>
        <a href="gold-room.html" class="grid-link"><img src="gold.jpeg" alt="Gold Room"></a>
        <a href="concrete-room.html" class="grid-link"><img src="concrete.jpeg" alt="Concrete Room"></a>
        
        <!-- Row 2 -->
        <a href="development.html" class="grid-link"><img src="Aqua.jpeg" alt="A&R Department"></a>
        <a href="deeafro-room.html" class="grid-link"><img src="gold.jpeg" alt="Memz & DeeAfro"></a>
        <a href="polluted-room.html" class="grid-link"><img src="concrete.jpeg" alt="Polluted Records"></a>
        <a href="#" class="grid-link" onclick="return false;"><img src="studio.jpeg" alt="Placeholder"></a>
        
        <!-- Row 3 -->
        <a href="#" class="grid-link" onclick="return false;"><img src="platinum.jpeg" alt="Placeholder"></a>
        <a href="#" class="grid-link" onclick="return false;"><img src="gold.jpeg" alt="Placeholder"></a>
        <a href="#" class="grid-link" onclick="return false;"><img src="concrete.jpeg" alt="Placeholder"></a>
        <a href="#" class="grid-link" onclick="return false;"><img src="Aqua.jpeg" alt="Placeholder"></a>
    </div>

</body>
</html>
