<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foyer — Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important; /* Pure crisp white background */
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        /* Header Group Container */
        .header-group {
            text-align: center;
            margin-bottom: 70px;
        }
        .main-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.2rem;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }
        .sub-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: normal;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin: 0;
        }
        /* Balanced 5-Column Grid Matrix */
        .gallery-wall {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 45px;
            width: 100%;
            max-width: 1100px;
            justify-items: center;
            align-content: center;
        }
        /* Individual Award Frame */
        .room-frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .room-frame:hover {
            transform: translateY(-8px);
        }
        /* Base vinyl shape holding your master image */
        .disc-icon {
            width: 160px;
            height: 160px;
            background-image: url('FlaveRSoulLogo001.JPG');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            margin-bottom: 25px;
            transition: filter 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.06);
            position: relative;
        }
        /* 1. Gold Disc: Mainstream Top Songs */
        .disc-gold {
            filter: sepia(0.8) hue-rotate(5deg) saturate(2.5) brightness(0.95);
        }
        .room-frame:hover .disc-gold {
            box-shadow: 0 15px 30px rgba(212,175,55,0.45);
        }
        /* 2. Silver Disc: Soul Music */
        .disc-silver {
            filter: grayscale(1) brightness(1.1) contrast(1.05);
        }
        .room-frame:hover .disc-silver {
            box-shadow: 0 15px 30px rgba(170,170,170,0.4);
        }
        /* 3. Platinum Disc: Dance Music */
        .disc-platinum {
            filter: grayscale(1) brightness(1.4) contrast(1.2) sepia(0.05);
        }
        .room-frame:hover .disc-platinum {
            box-shadow: 0 15px 30px rgba(200,220,230,0.5);
        }
        /* 4. Bronze Disc: Spanish Music */
        .disc-bronze {
            filter: sepia(0.9) hue-rotate(345deg) saturate(1.8) brightness(0.75) contrast(1.1);
        }
        .room-frame:hover .disc-bronze {
            box-shadow: 0 15px 30px rgba(210,105,30,0.4);
        }
        /* 5. Pure High-Intensity Pink Granite Disc: Rock Music */
        .disc-granite {
            background-blend-mode: multiply;
            background-color: #ff6b8b; /* Direct vivid pink stone base saturation injection */
            filter: grayscale(0.3) contrast(1.2) brightness(0.9);
        }
        .room-frame:hover .disc-granite {
            background-color: #ff4772; /* Deepens dynamically to hot granite pink on hover */
            box-shadow: 0 15px 35px rgba(255, 71, 114, 0.45);
        }
        /* Typography Styling */
        .room-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-align: center;
        }
        .room-status {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.75rem;
            color: #888888;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Styled Header Layout Block -->
    <div class="header-group">
        <h1 class="main-title">Flave R Soul Records</h1>
        <h2 class="sub-title">The Foyer</h2>
    </div>

    <div class="gallery-wall">

        <!-- Gold Award Frame -->
        <a href="gold-room.html" class="room-frame">
            <div class="disc-icon disc-gold"></div>
            <span class="room-title">Gold Room</span>
            <span class="room-status">Mainstream Hits</span>
        </a>

        <!-- Silver Award Frame -->
        <a href="silver-room.html" class="room-frame">
            <div class="disc-icon disc-silver"></div>
            <span class="room-title">Silver Room</span>
            <span class="room-status">Soul Music</span>
        </a>

        <!-- Platinum Award Frame -->
        <a href="platinum-room.html" class="room-frame">
            <div class="disc-icon disc-platinum"></div>
            <span class="room-title">Platinum Room</span>
            <span class="room-status">Dance Music</span>
        </a>

        <!-- Bronze Award Frame -->
        <a href="bronze-room.html" class="room-frame">
            <div class="disc-icon disc-bronze"></div>
            <span class="room-title">Bronze Room</span>
            <span class="room-status">Spanish Catalog</span>
        </a>

        <!-- Pink Granite Award Frame -->
        <a href="granite-room.html" class="room-frame">
            <div class="disc-icon disc-granite"></div>
            <span class="room-title">Granite Room</span>
            <span class="room-status">Rock Music</span>
        </a>

    </div>

</body>
</html>
