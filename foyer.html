<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Template — Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            color: #000000 !important;
        }

        /* Header Group Container */
        .header-group {
            text-align: center;
            margin-bottom: 60px;
            width: 100%;
        }
        .main-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.2rem;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }
        .sub-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: normal;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin: 0;
        }

        /* Standard Content Container for Rooms */
        .room-content {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            text-align: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #000000 !important;
        }

        /* Brand Footer Container & Links Styles */
        .brand-footer {
            margin-top: auto; /* Pushes footer to the bottom if content is short */
            padding-top: 60px;
            text-align: center;
            width: 100%;
        }
        
        .footer-copyright {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-size: 0.85rem;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 15px 0;
        }
        
        .secret-biography-anchor {
            color: #000000 !important;
            text-decoration: none;
            cursor: default; /* Blends seamlessly into normal text */
        }

        .footer-links-group {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px 25px;
        }

        .footer-sub-link {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-size: 0.8rem;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
            transition: border-color 0.2s ease;
        }

        .footer-sub-link:hover {
            border-bottom-color: #000000;
        }
    </style>
</head>
<body>

    <div class="header-group">
        <h1 class="main-title">Flave R Soul Records</h1>
        <h2 class="sub-title">Room Name</h2>
    </div>

    <div class="room-content">
        <!-- Room specific text, tracklists, or elements go right here -->
    </div>

    <!-- Brand Footer Container with Unique Secret Anchor -->
    <div class="brand-footer">
        <p class="footer-copyright">
            Flave R Soul Records <a href="secret-page-one.html" class="secret-biography-anchor">©</a> 2026
        </p>
        <div class="footer-links-group">
            <a href="index.html" class="footer-sub-link">Return to Foyer</a>
        </div>
    </div>

</body>
</html>
