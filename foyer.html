<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foyer — Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important; /* Pure crisp white background */
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 60px;
            font-size: 2.2rem;
            text-align: center;
        }
        /* Dynamic 4-Column Gallery Wall Layout Grid */
        .gallery-wall {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            justify-items: center;
            align-content: center;
        }
        /* Individual Award Frame */
        .room-frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .room-frame:hover {
            transform: translateY(-8px); /* Dynamic lift on hover */
        }
        /* Base disc structure linking your master character graphic */
        .disc-icon {
            width: 170px;
            height: 170px;
            background-image: url('FlaveRSoulLogo001.JPG');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            margin-bottom: 20px;
            transition: filter 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.06);
        }
        /* 1. Gold Disc: Mainstream Top Songs */
        .disc-gold {
            filter: sepia(0.8) hue-rotate(5deg) saturate(2.5) brightness(0.95);
        }
        .room-frame:hover .disc-gold {
            box-shadow: 0 15px 30px rgba(212,175,55,0.45);
        }
        /* 2. Silver Disc: Soul Music */
        .disc-silver {
            filter: grayscale(1) brightness(1.1) contrast(1.05);
        }
        .room-frame:hover .disc-silver {
            box-shadow: 0 15px 30px rgba(170,170,170,0.4);
        }
        /* 3. Platinum Disc: Dance Music */
        .disc-platinum {
            filter: grayscale(1) brightness(1.4) contrast(1.2) sepia(0.05);
        }
        .room-frame:hover .disc-platinum {
            box-shadow: 0 15px 30px rgba(200,220,230,0.5);
        }
        /* 4. Bronze Disc: Spanish Music */
        .disc-bronze {
            filter: sepia(0.9) hue-rotate(345deg) saturate(1.8) brightness(0.75) contrast(1.1);
        }
        .room-frame:hover .disc-bronze {
            box-shadow: 0 15px 30px rgba(1cd,105,30,0.4);
        }
        /* Typography Styling */
        .room-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000;
            font-size: 1.15rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .room-status {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.75rem;
            color: #888888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>The Foyer</h1>

    <div class="gallery-wall">

        <!-- Gold Award Frame -->
        <a href="gold-room.html" class="room-frame">
            <div class="disc-icon disc-gold"></div>
            <span class="room-title">Gold Room</span>
            <span class="room-status">Mainstream Hits</span>
        </a>

        <!-- Silver Award Frame -->
        <a href="silver-room.html" class="room-frame">
            <div class="disc-icon disc-silver"></div>
            <span class="room-title">Silver Room</span>
            <span class="room-status">Soul Music</span>
        </a>

        <!-- Platinum Award Frame -->
        <a href="platinum-room.html" class="room-frame">
            <div class="disc-icon disc-platinum"></div>
            <span class="room-title">Platinum Room</span>
            <span class="room-status">Dance Music</span>
        </a>

        <!-- Bronze Award Frame -->
        <a href="bronze-room.html" class="room-frame">
            <div class="disc-icon disc-bronze"></div>
            <span class="room-title">Bronze Room</span>
            <span class="room-status">Spanish Catalog</span>
        </a>

    </div>

</body>
</html>
