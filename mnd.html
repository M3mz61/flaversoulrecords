<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memz & DeeAfro — Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #000000;
        }

        /* Header Image */
        .header-image {
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
            margin-bottom: 40px;
        }
        .header-image img {
            width: 100%;
            height: auto;
        }

        /* New Layout Container */
        .layout-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        .memz-image {
            width: 150px; /* Adjust size as needed */
            height: auto;
        }

        .text-content {
            text-align: left;
        }

        /* Footer */
        .footer {
            margin-top: 100px;
            margin-bottom: 50px;
            font-family: 'Bodoni 72', 'Bodoni MT', 'Didot', serif;
            font-size: 0.8rem;
            color: #000000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-image">
        <img src="mnd/bkg.png" alt="Memz & DeeAfro Header">
    </div>

    <div class="layout-wrapper">
        <img src="mnd/memz01.jpeg" alt="Memz" class="memz-image">
        <div class="text-content">
            <h1>Memz &amp; DeeAfro</h1>
            <p>Official releases and production archives.</p>
        </div>
    </div>

    <div class="footer">
        Flave R Soul Records ©️ 2026
    </div>

</body>
</html>
