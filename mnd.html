<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memz & DeeAfro — Flave R Soul Records</title>
    <style>
        body { 
            background-color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            color: #000000; 
        }

        .top-logo { width: 100%; max-width: 600px; margin-bottom: -40px; text-align: center; }
        .top-logo img { width: 100%; height: auto; }
        
        .image-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            max-width: 600px; 
            width: 100%; 
            margin-bottom: 30px; 
        }
        
        .image-link { 
            display: block; 
            width: 100%;
            height: 300px; 
            overflow: hidden; 
            border: 1px solid #000; 
        }
        
        .image-link img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: top; 
            display: block; 
        }
        
        .text-content { text-align: center; max-width: 600px; width: 100%; }
        .text-content h1 { margin: 0 0 10px 0; font-size: 1.8rem; }
        .text-content p { margin: 0; font-size: 1.1rem; }
        
        .foyer-btn { 
            display: block; 
            padding: 20px; 
            margin-top: 40px; 
            font-family: 'Bodoni 72', 'Bodoni MT', 'Didot', serif; 
            font-size: 1rem; 
            color: #000000; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-decoration: none; 
            border: 1px solid #000000; 
            text-align: center;
        }
        
        .footer { 
            margin-top: 50px; 
            font-family: 'Bodoni 72', 'Bodoni MT', 'Didot', serif; 
            font-size: 0.8rem; 
            color: #000000; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            text-align: center; 
        }
    </style>
</head>
<body>
    <div class="top-logo"><img src="mnd/bkg.png" alt="Logo"></div>
    
    <div class="image-grid">
        <a href="memz.html" class="image-link">
            <img src="mnd/memz01.jpeg" alt="Memz">
        </a>
        <a href="deeafro.html" class="image-link">
            <img src="mnd/dts.jpg" alt="DeeAfro">
        </a>
    </div>
    
    <div class="text-content">
        <h1>Memz &amp; DeeAfro</h1>
        <p>Official releases and production archives.</p>
    </div>
    
    <a href="index.html" class="foyer-btn">Return to Foyer</a>
    
    <div class="footer">Flave R Soul Records ©️ 2026</div>
</body>
</html>
