<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memz & DeeAfro — Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #000000;
        }

        .top-logo {
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
            text-align: center;
        }
        .top-logo img { width: 100%; height: auto; }

        /* Two-column layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 600px;
            width: 100%;
            align-items: start;
        }

        /* Right column for dts.jpg */
        .right-column {
            width: 100%;
        }
        .right-column img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Left column for text */
        .text-content {
            text-align: left;
        }
        .text-content h1 { margin: 0 0 10px 0; font-size: 1.8rem; }
        .text-content p { margin: 0; font-size: 1.1rem; }

        .foyer-link {
            display: block;
            margin-top: 40px;
            font-family: 'Bodoni 72', 'Bodoni MT', 'Didot', serif;
            font-size: 0.9rem;
            color: #000000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            border-bottom: 1px solid #000000;
        }

        .footer {
            margin-top: 50px;
            font-family: 'Bodoni 72', 'Bodoni MT', 'Didot', serif;
            font-size: 0.8rem;
            color: #000000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="top-logo">
        <img src="mnd/bkg.png" alt="Memz & DeeAfro Logo">
    </div>

    <div class="main-layout">
        <div class="text-content">
            <h1>Memz &amp; DeeAfro</h1>
            <p>Official releases and production archives.</p>
        </div>
        <div class="right-column">
            <img src="mnd/dts.jpg" alt="Memz & DeeAfro">
        </div>
    </div>

    <a href="index.html" class="foyer-link">Return to Foyer</a>

    <div class="footer">
        Flave R Soul Records ©️ 2026
    </div>

</body>
</html>
