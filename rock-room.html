<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granite Room — Flave R Soul Granite</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Header Group Container */
        .header-group {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }
        .main-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.2rem;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }
        .sub-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: normal;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin: 0;
        }

        /* Centered Graphic Element with Precision Balance Fix */
        .showcase-disc {
            width: 280px;
            height: 280px;
            background-image: url("rock.jpeg");
            background-size: 103%; /* Perfect balance to keep the fine outer ring crisp */
            background-repeat: no-repeat;
            background-position: 47% center; /* Micro-adjustment to center the graphic perfectly */
            border-radius: 50%;
            margin: 0 auto 50px auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        /* Tracklist Section */
        .tracklist-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }
        .track-entry {
            display: flex;
            flex-direction: column;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background-color: #fafafa;
        }
        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .track-name {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1.3rem;
            color: #000000;
        }
        .track-version {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.8rem;
            color: #777777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .track-meta {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.75rem;
            color: #999999;
            letter-spacing: 0.5px;
        }

        /* Premium Return Button Styling */
        .foyer-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1rem;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 10px 25px;
            border: 1px solid #000000;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
            text-align: center;
        }
        .foyer-button:hover {
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="header-group">
        <h1 class="main-title">Flave R Soul Records</h1>
        <h2 class="sub-title">The Granite Room — Rock Catalog</h2>
    </div>

    <div class="showcase-disc"></div>

    <div class="tracklist-container">
        
        <div class="track-entry">
            <div class="track-header">
                <span class="track-name">My Vagabknd Heart</span>
                <span class="track-version">Original Mix</span>
            </div>
            <span class="track-meta">ISRC: Coming Soon • Release Year: 2026</span>
        </div>

        <div class="track-entry">
            <div class="track-header">
                <span class="track-name">Outta Control</span>
                <span class="track-version">Black Rose Edition</span>
            </div>
            <span class="track-meta">ISRC: Coming Soon • Release Year: 2026</span>
        </div>

    </div>

    <!-- Navigation Back Link -->
    <a href="foyer.html" class="foyer-button">Return to Foyer</a>

</body>
</html>
