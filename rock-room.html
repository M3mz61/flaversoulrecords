            margin: 0;

            display: flex;
            flex-direction: column;

            min-height: 100vh;
            box-sizing: border-box;

        /* Header Group Container */
        .header-group {
            text-align: center;
            margin-bottom: 50px;
        }
        .main-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;

            line-height: 1.2;
        }
        .sub-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: normal;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin: 0;
        }

        /* Centered Graphic Element */
        .showcase-disc {
            width: 280px;
            height: 280px;
            background-image: url("ROCK.jpg"); /* Set to your exact filename */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }
