<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granite Room — Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Top Brand Graphic Asset */
        .showcase-disc {
            width: 280px;
            height: 280px;
            background-image: url("Logo/rock.jpeg");
            background-size: 103%; 
            background-repeat: no-repeat;
            background-position: 47% center; 
            border-radius: 50%;
            margin: 20px auto 45px auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        /* Tracklist Section Container */
        .tracklist-container {
            width: 100%;
            max-width: 440px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 45px;
        }

        /* Track Details Card Layout - Hard Solid Black Styling */
        .track-entry {
            display: flex;
            flex-direction: column;
            padding: 22px;
            border: 1px solid #000000; /* Sharp black borders */
            border-radius: 0px; 
            background-color: #ffffff; 
            box-sizing: border-box;
        }

        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .track-name {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1.4rem;
            color: #000000; /* Solid Black */
            letter-spacing: -0.2px;
        }

        .track-version {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.75rem;
            color: #000000; /* Swapped to Solid Black */
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .track-meta {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.75rem;
            color: #000000; /* Swapped to Solid Black */
            letter-spacing: 0.3px;
        }

        /* Premium Return Foyer Button Style */
        .foyer-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-size: 1rem;
            color: #000000; /* Solid Black */
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 14px 35px;
            border: 1px solid #000000;
            border-radius: 0px;
            background: transparent;
            transition: all 0.25s ease;
            display: inline-block;
            text-align: center;
        }

        .foyer-button:hover {
            background-color: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Centered Brand Logo Graphic Asset -->
    <div class="showcase-disc"></div>

    <!-- Live Release Track List Grid Array -->
    <div class="tracklist-container">
        
        <!-- Track Entry: 01 -->
        <div class="track-entry">
            <div class="track-header">
                <span class="track-name">My Vagabond Heart</span>
                <span class="track-version">Original Mix</span>
            </div>
            <span class="track-meta">ISRC: Coming Soon • Release Year: 2026</span>
        </div>

        <!-- Track Entry: 02 -->
        <div class="track-entry">
            <div class="track-header">
                <span class="track-name">Outta Control</span>
                <span class="track-version">Black Rose Edition</span>
            </div>
            <span class="track-meta">ISRC: Coming Soon • Release Year: 2026</span>
        </div>

    </div>

    <!-- Navigation Bottom Link Back Home -->
    <a href="index.html" class="foyer-button">Return to Foyer</a>

</body>
</html>
