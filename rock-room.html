
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Room — Flave R Soul Records</title>
    <style>
        body {
            background-color: #000000 !important; /* Deep black backdrop for the Rock Room */
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Header Group Container */
        .header-group {
            text-align: center;
            margin-bottom: 50px;
        }
        .main-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.2rem;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }
        .sub-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: normal;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin: 0;
        }

        /* Centered Graphic Element */
        .showcase-disc {
            width: 280px;
            height: 280px;
            /* Pointing to your second image asset style (e.g., granite/rose tint if uploaded) */
            background-image: url("ROCK%20.jpeg"); 
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(255,255,255,0.05);
        }

        /* Tracklist Section */
        .tracklist-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .track-entry {
            display: flex;
            flex-direction: column;
            padding: 20px;
            border: 1px solid #333333;
            border-radius: 4px;
            background-color: #111111;
        }
        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .track-name {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1.3rem;
            color: #ffffff;
        }
        .track-version {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.8rem;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .track-meta {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.75rem;
            color: #666666;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="header-group">
        <h1 class="main-title">Flave R Soul Records</h1>
        <h2 class="sub-title">The Rock Room — Catalog</h2>
    </div>

    <div class="showcase-disc"></div>

    <div class="tracklist-container">
        
        <div class="track-entry">
            <div class="track-header">
                <span class="track-name">Track Title One</span>
                <span class="track-version">Original Mix</span>
            </div>
            <span class="track-meta">ISRC: Coming Soon • Release Year: 2026</span>
        </div>

        <div class="track-entry">
            <div class="track-header">
                <span class="track-name">Track Title Two</span>
                <span class="track-version">Rock Edit</span>
            </div>
            <span class="track-meta">ISRC: Coming Soon • Release Year: 2026</span>
        </div>

    </div>

</body>
</html>
