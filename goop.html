<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gold Room — Legacy Catalog</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        h1, h2, h3 {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            text-transform: uppercase;
            margin: 0;
        }

        .header-group { text-align: center; margin-bottom: 50px; }
        .main-title { font-size: 2.2rem; letter-spacing: 4px; margin-bottom: 16px; }
        .sub-title { font-size: 1.2rem; letter-spacing: 3px; font-weight: normal; }

        .catalog-container { width: 100%; max-width: 600px; }

        .imprint-header { 
            font-size: 1rem; 
            letter-spacing: 2px; 
            margin-top: 50px; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #000;
            padding-bottom: 5px;
        }

        .track-entry {
            margin-bottom: 30px;
        }

        .track-name { font-family: "Bodoni 72", serif; font-weight: bold; font-size: 1.2rem; }
        .track-artist { font-size: 0.9rem; margin-top: 4px; }
        
        .tx-link {
            display: block;
            margin-top: 6px;
            color: #000000;
            font-size: 0.7rem;
            text-decoration: underline;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header-group">
        <h1 class="main-title">Flave R Soul Records</h1>
        <h2 class="sub-title">The Gold Room</h2>
    </div>

    <div class="catalog-container">
        
        <h3 class="imprint-header">Flave R Soul Groove</h3>
        
        <div class="track-entry">
            <div class="track-name">Swoon (K-Hole)</div>
            <div class="track-artist">Memz & DeeAfro</div>
            <a href="#" class="tx-link">Traxsource</a>
        </div>

    </div>

</body>
</html>
