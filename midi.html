<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI Equipment — Flaversoul Records</title>
    <style>
        body {
            background-color: #ffffff !important;
            color: #000000 !important;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-bottom: 50px;
        }

        .item-entry {
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        .item-name {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        .foyer-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1rem;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 10px 25px;
            border: 1px solid #000000;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
        }

        .foyer-button:hover {
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="item-entry">
            <span class="item-name">Yamaha MX88</span>
            <img src="Mac/MX88.jpeg" alt="Yamaha MX88">
        </div>

        <div class="item-entry">
            <span class="item-name">Alesis DM5 Kit</span>
            <img src="Mac/dm5kit_front_lg.jpeg" alt="Alesis DM5 Kit">
        </div>

        <div class="item-entry">
            <span class="item-name">Roland TR-8S</span>
            <img src="Mac/tr-8s.jpeg" alt="Roland TR-8S">
        </div>

        <div class="item-entry">
            <span class="item-name">M-Audio Axiom 49</span>
            <img src="Mac/AX49.jpeg" alt="M-Audio Axiom 49">
        </div>
    </div>

    <a href="studio.html" class="foyer-button">Return to Studio</a>

</body>
</html>
