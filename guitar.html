<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitars</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 40px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto 50px auto;
        }

        /* Forces all images into a uniform square container */
        .guitar-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .guitar-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .studio-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1rem;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 10px 25px;
            border: 1px solid #000000;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-top: auto;
        }
        .studio-button:hover {
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 4px;
        }

        @media (max-width: 1024px) and (orientation: portrait) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="guitar-wrapper"><img src="Guitar/WS12.jpg" alt="Guitar"></div>
        <div class="guitar-wrapper"><img src="Guitar/J45std.jpeg" alt="Guitar"></div>
        <div class="guitar-wrapper"><img src="Guitar/Hnyd1.jpeg" alt="Guitar"></div>
        <div class="guitar-wrapper"><img src="Guitar/ES355.jpeg" alt="Guitar"></div>
        <div class="guitar-wrapper"><img src="Guitar/hws1.jpeg" alt="Guitar"></div>
        <div class="guitar-wrapper"><img src="Guitar/Jem.jpg" alt="Guitar"></div>
        <div class="guitar-wrapper"><img src="Guitar/LP1.jpeg" alt="Guitar"></div>
        <div class="guitar-wrapper"><img src="Guitar/SRX700.jpeg" alt="Guitar"></div>
    </div>

    <a href="studio.html" class="studio-button">Return to Studio</a>

</body>
</html>
