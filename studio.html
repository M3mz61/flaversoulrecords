<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Instruments</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 40px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #000000 !important;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* Dropdown Button Styling */
        .dropdown {
            position: relative;
            display: inline-block;
            margin-bottom: 40px;
        }

        .dropbtn {
            background-color: transparent;
            color: #000000 !important;
            padding: 12px 24px;
            font-size: 1rem;
            border: 1px solid #000000;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            font-family: 'Bodoni 72', 'Bodoni MT', 'Didot', serif;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            min-width: 160px;
            border: 1px solid #000000;
            z-index: 1;
        }

        .dropdown-content a {
            color: #000000 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-transform: uppercase;
            font-weight: bold;
            font-family: 'Bodoni 72', 'Bodoni MT', 'Didot', serif;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown:hover .dropbtn {
            background-color: #000000;
            color: #ffffff !important;
        }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }

        .studio-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1rem;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 10px 25px;
            border: 1px solid #000000;
            background: transparent;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="dropdown">
        <button class="dropbtn">Studio Instruments</button>
        <div class="dropdown-content">
            <a href="guitars.html">Guitars</a>
            <a href="midi.html">Midi</a>
        </div>
    </div>

    <a href="studio.html" class="studio-button">Return to Studio</a>

</body>
</html>
