<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Hire — Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 40px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            color: #000000 !important;
        }

        .header-group {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }
        .main-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.2rem;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }
        .sub-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: normal;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin: 0;
        }

        .showcase-disc {
            width: 280px;
            height: 280px;
            background-image: url("Logo/opal.png"); /* Pulls your premium opal insignia background */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        /* Booking Matrix Layout Wrapper */
        .matrix-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .matrix-entry {
            display: flex;
            flex-direction: column;
            padding: 24px;
            border: 1px solid #000000 !important;
            border-radius: 4px;
            background-color: #fafafa;
            box-sizing: border-box;
        }
        
        .matrix-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
            gap: 15px;
        }
        .rate-name {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1.4rem;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .rate-price {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1.4rem;
            color: #000000 !important;
            white-space: nowrap;
        }
        .rate-description {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            line-height: 1.4;
        }

        /* Single Center Portfolio Portal Button */
        .portal-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1rem;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 12px 35px;
            border: 1px solid #000000 !important;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
            text-align: center;
            margin-top: 20px;
            -webkit-tap-highlight-color: transparent;
        }
        .portal-button:hover {
            background-color: #000000;
            color: #ffffff !important;
            letter-spacing: 4px;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            body {
                padding: 30px 15px 40px 15px;
            }
            .main-title {
                font-size: 1.7rem;
            }
            .showcase-disc {
                width: 240px;
                height: 240px;
            }
            .rate-name, .rate-price {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="header-group">
        <h1 class="main-title">Flave R Soul Records</h1>
        <h2 class="sub-title">Exclusive Studio Hire</h2>
    </div>

    <div class="showcase-disc"></div>

    <div class="matrix-container">
        
        <!-- Rate Node 1 -->
        <div class="matrix-entry">
            <div class="matrix-header">
                <span class="rate-name">Single Hour Run</span>
                <span class="rate-price">£75</span>
            </div>
            <p class="rate-description">QUICK DROP-INS & SPOT EDITS</p>
        </div>

        <!-- Rate Node 2 -->
        <div class="matrix-entry">
            <div class="matrix-header">
                <span class="rate-name">Two Hour Session</span>
                <span class="rate-price">£140</span>
            </div>
            <p class="rate-description">FOCUSED TRACKING WINDOW</p>
        </div>

        <!-- Rate Node 3 -->
        <div class="matrix-entry">
            <div class="matrix-header">
                <span class="rate-name">Half Day Session (3-4 Hours)</span>
                <span class="rate-price">£65 / hr</span>
            </div>
            <p class="rate-description">EXTENDED PRODUCTION BLOCK</p>
        </div>

    </div>

    <!-- Returns cleanly to the parent matrix foyer without self-referencing loops -->
    <a href="index.html" class="portal-button">Return to Foyer</a>

    <p style="font-family: 'Bodoni 72', serif; font-size: 0.8rem; color: #000000 !important; text-transform: uppercase; letter-spacing: 3px; text-align: center; margin-top: 30px; margin-bottom: 20px;">Flave R Soul Records &copy; 2026</p>

</body>
</html>
