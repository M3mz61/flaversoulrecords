<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Hire — Flaversoul Records</title>
    <style>
        body {
            background-color: #ffffff !important;
            color: #000000 !important;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .showcase-disc {
            display: block;
            width: 280px;
            height: 280px;
            background-image: url("Logo/studio.jpeg");
            background-size: 116% 116%;
            background-repeat: no-repeat;
            background-position: center center;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            text-decoration: none;
            outline: none;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .showcase-disc:hover {
            transform: scale(1.01);
            box-shadow: 0 25px 45px rgba(0,0,0,0.16);
        }

        .price-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 45px;
            border-top: 1px solid #000000;
            border-bottom: 1px solid #000000;
            padding: 25px 10px;
            box-sizing: border-box;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
        }
        .price-row:last-child { margin-bottom: 0; }
        .price-item { font-family: "Bodoni 72", "Bodoni MT", "Didot", serif; font-weight: bold; font-size: 1.15rem; color: #000000; letter-spacing: 1px; }
        .price-value { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 1.1rem; font-weight: 600; color: #000000; }
        .price-subtext { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 0.8rem; color: #000000; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .tracklist-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; margin-bottom: 50px; }
        .track-entry { display: flex; flex-direction: column; padding: 20px; border: 1px solid #000000; border-radius: 4px; background-color: #ffffff; text-decoration: none; color: #000000; transition: all 0.3s ease; }
        .track-entry:hover { border-color: #000000; background-color: #f9f9f9; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .track-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
        .track-name { font-family: "Bodoni 72", "Bodoni MT", "Didot", serif; font-weight: bold; font-size: 1.3rem; color: #000000; }
        .track-version { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 0.8rem; color: #000000; text-transform: uppercase; letter-spacing: 1px; }
        .track-meta { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 0.75rem; color: #000000; letter-spacing: 0.5px; }

        .foyer-button { font-family: "Bodoni 72", "Bodoni MT", "Didot", serif; font-weight: bold; font-size: 1rem; color: #000000; text-transform: uppercase; letter-spacing: 3px; text-decoration: none; padding: 10px 25px; border: 1px solid #000000; border-radius: 2px; background: transparent; transition: all 0.3s ease; cursor: pointer; display: inline-block; margin-bottom: 40px; }
        .foyer-button:hover { background-color: #000000; color: #ffffff; letter-spacing: 4px; }
    </style>
</head>

            <span class="price-value">£375</span>
        </div>
