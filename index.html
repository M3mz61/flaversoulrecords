<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important; /* Pure crisp white background */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; /* Stacks logo above text */
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .logo-container {
            width: 75vw; /* Scales smoothly relative to screen width */
            max-width: 320px; /* Prevents it from getting too big on desktops */
            height: 75vw;
            max-height: 320px;
            background-image: url('FlaveRSoulLogo001.JPG');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-bottom: 25px; /* Perfect spacing before text */
        }
        .copyright-text {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif; /* Targets Bodoni 72 first */
            font-weight: bold;
            color: #000000;
            text-align: center;
            /* Fluid sizing: Scales dynamically but stays perfectly readable on all screens */
            font-size: calc(12px + 1vw); 
            letter-spacing: 0.5px;
            padding: 0 20px;
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Dead centered graphic -->
    <div class="logo-container"></div>

    <!-- Universal Scaling Copyright Line -->
    <p class="copyright-text">&copy; 2026 Flave R Soul Records. All rights reserved</p>

</body>
</html>
