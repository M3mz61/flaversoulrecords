<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flave R Soul Records</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            color: #c5c6c7;
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .links-gate {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }
        .btn {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-spotify:hover { background-color: #1DB954; border-color: #1DB954; color: #000; }
        .btn-soundcloud:hover { background-color: #ff5500; border-color: #ff5500; color: #fff; }
        .footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #45f3ff;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Flave R Soul Records</h1>
        <p>Independent bedroom productions, deep house grooves, rock editions, and soulful melodies.</p>

        <div class="links-gate">
            <a href="https://soundcloud.com" class="btn btn-soundcloud">Private Remix Archives</a>
        </div>

        <div class="footer">
            REGISTRANT IDENTIFIER: GXL3V
        </div>
    </div>

</body>
</html>
