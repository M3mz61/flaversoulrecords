<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important; /* Pure crisp white backdrop */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* ==================================================== */
        /* STATIC HEADER (Locked to top, independent of scroll)*/
        /* ==================================================== */
        .static-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95); /* Semi-transparent to let content slide under nicely */
            backdrop-filter: blur(5px); /* Soft blur effect for content passing underneath */
            text-align: center;
            padding: 40px 20px 20px 20px;
            box-sizing: border-box;
            z-index: 1000; /* Keeps it layered above all scrolling elements */
        }
        
        .main-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.2rem;
            margin: 0;
            line-height: 1.2;
        }

        /* ==================================================== */
        /* MAIN SCROLLABLE CONTENT CONTAINER                   */
        /* ==================================================== */
        .landing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            margin-top: 180px; /* Pushes content down so it doesn't get hidden behind the static header */
            flex-grow: 1; /* Pushes the footer down towards the bottom */
        }

        /* Clickable Hero Logo Link */
        .logo-link {
            text-decoration: none;
            display: inline-block;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .logo-link:hover {
            transform: scale(1.03);
        }

        /* Central Gold Hero Asset */
        .hero-disc {
            width: 280px;
            height: 280px;
            background-image: url('gold.jpeg'); 
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        /* Elegant Entry Button */
        .enter-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1.2rem;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-decoration: none;
            padding: 12px 35px;
            border: 1px solid #000000;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
            margin-bottom: 40px;
            cursor: pointer;
        }
        .enter-button:hover {
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 7px;
        }

        /* Brand Footer Text */
        .copyright-text {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #777777; /* Slightly softened down from pure black for premium aesthetic */
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            line-height: 1.6;
            margin-bottom: 40px; /* Gives room at the very bottom of the viewport */
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <header class="static-header">
        <h1 class="main-title">Flave R Soul Records</h1>
    </header>

    <div class="landing-container">
        
        <a href="foyer.html" class="logo-link">
            <div class="hero-disc"></div>
        </a>

        <a href="foyer.html" class="enter-button">Enter</a>

    </div>

    <div class="copyright-text">
        © 2026 Flave R Soul Records. All rights reserved
    </div>

</body>
</html>
