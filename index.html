<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flave R Soul Records</title>
    <style>
        body {
            background-color: #07080a;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        /* Minimalist Vinyl Record Logo Graphic */
        .vinyl-logo {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #000 20%, #1a1a1a 21%, #000 40%, #ff3838 41%, #ff3838 45%, #000 46%);
            border-radius: 50%;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #111;
        }
        .vinyl-center {
            width: 40px;
            height: 40px;
            background-color: #07080a;
            border-radius: 50%;
            border: 1px solid #fff;
        }
        h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
            font-weight: 900;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Logo Graphic -->
    <div class="vinyl-logo">
        <div class="vinyl-center"></div>
    </div>
    
    <!-- Label Name -->
    <h1>Flave R Soul Records</h1>

</body>
</html>
