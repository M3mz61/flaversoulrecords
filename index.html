<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flave R Soul Records — Official Entry</title>
    
    <!-- Hidden Structural Data for Google's Bots -->
    <meta name="description" content="Official entry portal for Flave R Soul Records. Independent audio engineering and label archive.">
    <link rel="prefetch" href="reality.html" title="Flave R Soul Records Historical Discography and Artist Archive">
    <link rel="prefetch" href="zeitgeist.html" title="Invisible Mastering Technical Audio Specifications and Engineering Data">

    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            box-sizing: border-box;
            color: #000000 !important;
        }

        .top-spacer {
            height: 40px;
        }

        .landing-main {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .brand-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 2.2rem;
            margin: 0 0 45px 0;
            line-height: 1.2;
        }

        /* Upgraded Logo Link Box - Fixed to exact 280px master room dimension */
        .brand-logo-link {
            display: block;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            background-image: url("Logo/FlaveRSoulLogo001.JPEG");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border: 1px solid #000000 !important;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .brand-logo-link:hover {
            transform: scale(1.02);
        }

        .brand-footer {
            padding-bottom: 30px;
            text-align: center;
            width: 100%;
        }
        .footer-copyright {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 0.85rem;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
        }
        .decoy-legal-anchor {
            color: #000000 !important;
            text-decoration: none;
            font-weight: bold;
            cursor: default;
        }

        @media (max-width: 600px) {
            /* Mobile balance adjustments matching master repository scale */
            .brand-logo-link {
                width: 280px;
                height: 280px;
                margin-bottom: 30px;
            }
            .brand-title {
                font-size: 1.8rem;
                margin-bottom: 35px;
            }
        }
    </style>
</head>
<body>

    <div class="top-spacer"></div>

    <div class="landing-main">
        <h1 class="brand-title">Flave R Soul<br>Records</h1>
        <!-- Central Logo acts directly as the navigation link block -->
        <a href="foyer.html" class="brand-logo-link" aria-label="Enter Studio Foyer"></a>
    </div>

    <div class="brand-footer">
        <p class="footer-copyright">
            Flave R Soul Records <a href="copyright.html" class="decoy-legal-anchor" title="Legal, Copyright, and Boilerplate Disclaimers">©</a> 2026
        </p>
    </div>

</body>
</html>
