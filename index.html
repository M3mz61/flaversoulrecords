<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flave R Soul Records — Official Entry</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            box-sizing: border-box;
            color: #000000 !important;
        }

        .top-spacer {
            height: 40px;
        }

        .landing-main {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        /* Black and White Logo Insignia Box */
        .brand-logo {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            background-image: url("Logo/FlaveRSoulLogo001.JPEG");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border: 1px solid #000000 !important;
        }

        .brand-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 2.2rem;
            margin: 0 0 45px 0;
            line-height: 1.2;
        }

        /* Premium Bodoni Portal Control Button */
        .enter-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1.1rem;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-decoration: none;
            padding: 12px 50px;
            border: 1px solid #000000 !important;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
            display: inline-block;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .enter-button:hover {
            background-color: #000000;
            color: #ffffff !important;
            letter-spacing: 6px;
        }

        .brand-footer {
            padding-bottom: 30px;
            text-align: center;
            width: 100%;
        }
        .footer-copyright {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-size: 0.85rem;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
        }
        .secret-biography-anchor {
            color: #000000 !important;
            text-decoration: none;
            cursor: default;
        }

        @media (max-width: 600px) {
            .brand-logo {
                width: 220px;
                height: 220px;
                margin-bottom: 30px;
            }
            .brand-title {
                font-size: 1.8rem;
                margin-bottom: 35px;
            }
        }
    </style>
</head>
<body>

    <div class="top-spacer"></div>

    <div class="landing-main">
        <h1 class="brand-title">Flave R Soul<br>Records</h1>
        <div class="brand-logo"></div>
        <a href="foyer.html" class="enter-button">Enter</a>
    </div>

    <div class="brand-footer">
        <p class="footer-copyright">
            Flave R Soul Records <a href="zeitgeist.html" class="secret-biography-anchor">©</a> 2026
        </p>
    </div>

</body>
</html>
