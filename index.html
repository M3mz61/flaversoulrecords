<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important; /* Pure crisp white background */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; /* Stacks logo above text */
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .logo-container {
            width: 75vw;
            max-width: 320px;
            height: 75vw;
            max-height: 320px;
            /* Dual-fallback logic: Tries uppercase first, then lowercase automatically */
            background-image: url('FlaveRSoulLogo001.JPEG'), url('FlaveRSoulLogo001.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-bottom: 25px;
        }
        .copyright-text {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000 !important; /* Absolute pure black text */
            text-align: center;
            font-size: calc(14px + 1vw); 
            letter-spacing: 0.5px;
            padding: 0 20px;
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Centered Logo Graphic with built-in case safety -->
    <div class="logo-container"></div>

    <!-- Pure Black Dynamic Copyright Line -->
    <p class="copyright-text">&copy; 2026 Flave R Soul Records. All rights reserved</p>

</body>
</html>
