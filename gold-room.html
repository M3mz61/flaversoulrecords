<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gold Room — Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            color: #000000; /* Set body text to pure black */
        }

        .header-group {
            text-align: center;
            margin-bottom: 50px;
        }
        .main-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.2rem;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }
        .sub-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: normal;
            color: #000000; /* Changed from #555555 to pure black */
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin: 0;
        }

        .showcase-disc {
            width: 280px;
            height: 280px;
            background-image: url("gold.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        audio {
            margin-bottom: 40px;
            width: 100%;
            max-width: 400px;
        }

        .tracklist-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }
        
        .track-entry {
            display: flex;
            flex-direction: column;
            padding: 20px;
            border: 1px solid #000000; /* Changed from #e0e0e0 to pure black */
            border-radius: 4px;
            background-color: #ffffff; /* Changed from #fafafa to white */
            text-decoration: none;
            color: #000000;
            transition: all 0.3s ease;
        }
        .track-entry:hover {
            border-color: #000000;
            background-color: #f8f8f8;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transform: translateY(-2px);
        }
        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .track-name {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1.3rem;
            color: #000000;
        }
        .track-version {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.8rem;
            color: #000000; /* Changed from #777777 to pure black */
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }
        .track-entry:hover .track-version {
            color: #000000;
            border-color: #000000;
        }
        .track-artist {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: #000000; /* Changed from #333333 to pure black */
            margin-bottom: 8px;
        }
        .track-meta {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.75rem;
            color: #000000; /* Changed from #999999 to pure black */
            letter-spacing: 0.5px;
        }

        .foyer-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1rem;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 10px 25px;
            border: 1px solid #000000;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 40px;
            display: inline-block;
        }
        .foyer-button:hover {
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="header-group">
        <h1 class="main-title">Flave R Soul Records</h1>
        <h2 class="sub-title">The Gold Room — Legacy Catalog</h2>
    </div>

    <div class="showcase-disc"></div>

    <audio controls>
        <source src="Living Without Your Love.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="tracklist-container">
        <!-- Tracks 1-12 remain the same -->
        <!-- Track 13 -->
        <div class="track-entry">
            <div class="track-header">
                <span class="track-name">Swoon (K-Hole)</span>
                <span class="track-version">Original Mix</span>
            </div>
            <div class="track-artist">Memz & DeeAfro</div>
            <span class="track-meta">Official Release Portfolio • Imprint: Flave R Soul Groove</span>
        </div>
    </div>

    <a href="index.html" class="foyer-button">Return to Foyer</a>

    <p style="font-family: 'Bodoni 72', serif; font-size: 0.8rem; color: #000000; text-transform: uppercase; letter-spacing: 3px; text-align: center; margin-top: 10px; margin-bottom: 20px;">Flave R Soul Records ©️ 2026</p>

</body>
</html>
