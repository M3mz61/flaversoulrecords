<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Workspace — Flave R Soul</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Symmetrical top speaker layout */
        .speaker-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 400px;
        }

        .speaker-row img {
            width: 45%;
            height: auto;
            max-width: 140px;
        }

        /* Master landscape image stack */
        .studio-gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 60px;
        }

        .studio-gallery img {
            width: 100%;
            height: auto;
            border: 1px solid #000000;
            display: block;
        }

        /* Navigation Matrix controls matching label typography */
        .foyer-button {
            display: inline-block;
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1rem;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 10px 25px;
            border: 1px solid #000000;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 40px;
        }
        .foyer-button:hover {
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 4px;
        }

        footer {
            margin-top: 20px;
            width: 100%;
        }
        .footer-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <!-- Symmetrical Pumping Speakers Layout -->
    <div class="speaker-row">
        <img src="mnd/Spkr_Memz1.gif" alt="Left Speaker Component">
        <img src="mnd/Spkr_Memz1.gif" alt="Right Speaker Component">
    </div>

    <!-- Silent Studio Work Archive Gallery (Inverted Portrait Stack) -->
    <div class="studio-gallery">
        <img src="mnd/memz01.jpeg" alt="Memz Close-up Portrait from the Polluted Records Launch Promotional Photo Shoot">
        <img src="mnd/M2.jpeg" alt="Flave R Soul engineering at the mixing console">
        <img src="mnd/memzeuphonix.jpeg" alt="Flave R Soul tracking at the Euphonix system hardware rig">
        <img src="mnd/Memz Euph.jpg" alt="Memz sitting at the SSL G Series mixing console">
    </div>

    <!-- Symmetrical Navigation Matrix Route -->
    <footer>
        <div class="footer-nav">
            <a href="mnd.html" class="foyer-button">Return to Memz & DeeAfro</a>
            <a href="index.html" class="foyer-button">Return to Foyer</a>
        </div>
    </footer>

    <!-- Persistent Brand Watermark with Stealth Link Node -->
    <p style="font-family: 'Bodoni 72', serif; font-size: 0.8rem; color: #999999; text-transform: uppercase; letter-spacing: 3px; text-align: center; margin-top: auto; margin-bottom: 20px;">
        Flave R Soul Records <a href="reality.html" style="color: #999999; text-decoration: none; cursor: default;">©️</a> 2026
    </p>

</body>
</html>
