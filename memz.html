<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Workspace — Flave R Soul</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Flex row layout to keep both speakers side-by-side */
        .speaker-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            margin-bottom: 60px;
            width: 100%;
            max-width: 400px;
        }

        .speaker-row img {
            width: 45%;
            height: auto;
            max-width: 140px;
        }

        .foyer-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1rem;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 10px 25px;
            border: 1px solid #000000;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 40px;
            display: inline-block;
        }
        .foyer-button:hover {
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <!-- Symmetrical Pumping Speakers Layout -->
    <div class="speaker-row">
        <img src="speaker.gif" alt="Left Speaker Component">
        <img src="speaker.gif" alt="Right Speaker Component">
    </div>

    <!-- Clean Navigation Return Link -->
    <a href="index.html" class="foyer-button">Return to Studio</a>

    <!-- Persistent Brand Watermark -->
    <p style="font-family: 'Bodoni 72', serif; font-size: 0.8rem; color: #999999; text-transform: uppercase; letter-spacing: 3px; text-align: center; margin-top: auto; margin-bottom: 20px;">Flave R Soul Records ©️ 2026</p>

</body>
</html>
