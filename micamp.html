<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Equipment</title>
    <style>
        body { background-color: #ffffff !important; margin: 0; padding: 40px 20px 60px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; color: #000000; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px 30px; max-width: 1000px; width: 100%; margin: 0 auto 50px auto; }
        .item { display: flex; flex-direction: column; align-items: center; text-align: center; }
        img { width: 100%; height: auto; display: block; object-fit: contain; }
        .label { font-family: sans-serif; font-size: 0.8rem; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .button-container { display: flex; gap: 20px; margin-bottom: 50px; }
        .studio-button { font-family: "Bodoni 72", "Bodoni MT", "Didot", serif; font-weight: bold; font-size: 0.8rem; color: #000000 !important; text-transform: uppercase; letter-spacing: 3px; text-decoration: none; padding: 10px 20px; border: 1px solid #000000; border-radius: 2px; transition: all 0.3s ease; }
        .studio-button:hover { background-color: #000000; color: #ffffff !important; letter-spacing: 4px; }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }
        @media (min-width: 601px) and (max-width: 1024px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div class="grid-container">
        <!-- Headphones -->
        <div class="item"><img src="MicAmp/dt770.jpeg" alt="DT770"><div class="label">DT770 Pro</div></div>
        
        <!-- Microphones -->
        <div class="item"><img src="MicAmp/u87.JPG" alt="U87"><div class="label">Neumann U87</div></div>
        <div class="item"><img src="MicAmp/re20.jpeg" alt="RE20"><div class="label">EV RE20</div></div>
        <div class="item"><img src="MicAmp/3035.jpeg" alt="AT3035"><div class="label">AT3035</div></div>
        <div class="item"><img src="MicAmp/sm58.jpeg" alt="SM58"><div class="label">Shure SM58</div></div>
        <div class="item"><img src="MicAmp/sm57.jpeg" alt="SM57"><div class="label">Shure SM57</div></div>

        <!-- Amps & Cabinets -->
        <div class="item"><img src="MicAmp/mg15.jpeg" alt="MG15"><div class="label">Marshall MG15</div></div>
        <div class="item"><img src="MicAmp/jcm900.jpeg" alt="JCM900"><div class="label">Marshall JCM900</div></div>
        <div class="item"><img src="MicAmp/jmp1.jpeg" alt="JMP1"><div class="label">Marshall JMP-1</div></div>
        <div class="item"><img src="MicAmp/line6.jpeg" alt="Line6"><div class="label">Line 6</div></div>
        <div class="item"><img src="MicAmp/ms2.jpeg" alt="MS2"><div class="label">Marshall MS-2</div></div>
        <div class="item"><img src="MicAmp/marshall1960b.jpg" alt="1960b"><div class="label">1979 Marshall 1960b</div></div>

        <!-- Speakers -->
        <div class="item"><img src="MicAmp/egg150.jpeg" alt="Egg150"><div class="label">EGG 150</div></div>
    </div>

    <div class="button-container">
        <a href="studio.html" class="studio-button">Return to Studio</a>
        <a href="index.html" class="studio-button">Return to Foyer</a>
    </div>

</body>
</html>
