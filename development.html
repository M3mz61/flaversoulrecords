<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A & R Room — Flave R Soul Records</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .header-group {
            text-align: center;
            margin-bottom: 50px;
        }
        .main-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.2rem;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }
        .sub-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: normal;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin: 0;
        }

        .showcase-disc {
            width: 280px;
            height: 280px;
            background-image: url("Logo/Aqua.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .action-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            margin-bottom: 50px;
        }

        .audition-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 30px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background-color: #fafafa;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .audition-box:hover {
            border-color: #000000;
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transform: translateY(-2px);
        }

        .audition-text {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #000000;
            letter-spacing: 0.5px;
            margin: 0 0 20px 0;
        }

        .audition-subtext {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-size: 1.1rem;
            line-height: 1.5;
            color: #444444;
            margin: 0;
        }

        .audition-email {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-weight: bold;
            display: block;
            margin-top: 15px;
            letter-spacing: 1px;
            color: #555555;
            transition: color 0.3s ease;
        }

        .audition-box:hover .audition-email {
            color: #000000;
        }

        .foyer-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1rem;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 10px 25px;
            border: 1px solid #000000;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .foyer-button:hover {
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 4px;
        }

        @media (max-width: 600px) {
            .main-title {
                font-size: 1.8rem;
            }
            .showcase-disc {
                width: 240px;
                height: 240px;
                margin-bottom: 35px;
            }
            .audition-text {
                font-size: 1.1rem;
            }
            .audition-subtext {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="header-group">
        <h1 class="main-title">Flave R Soul Records</h1>
        <h2 class="sub-title">The Artists & Repertoire — Development</h2>
    </div>

    <div class="showcase-disc"></div>

    <div class="action-container">
        
        <a href="mailto:memz@flaversoulrecords.com" class="audition-box">
            <p class="audition-text">
                If you’re a singer/songwriter and need help finishing your music, send a demo and maybe we can make an arrangement.
            </p>
            <p class="audition-subtext">
                To submit an audio file for consideration, please contact:
                <span class="audition-email">memz@flaversoulrecords.com</span>
            </p>
        </a>

    </div>

    <a href="index.html" class="foyer-button">Return to Foyer</a>

</body>
</html>
