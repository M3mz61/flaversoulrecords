<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Gear</title>
    <style>
        body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 40px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            color: #000000 !important;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto 50px auto;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .studio-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1rem;
            color: #000000 !important;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 10px 25px;
            border: 1px solid #000000;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-top: auto;
        }
        
        .studio-button:hover {
            background-color: #000000;
            color: #ffffff !important;
            letter-spacing: 4px;
        }

        /* iPhone view: Stacked (single column) */
        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }

        /* iPad/Tablet portrait: 2 columns */
        @media (min-width: 601px) and (max-width: 1024px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <img src="FX/1604vlzpro.jpeg" alt="Analog Gear">
        <img src="FX/octopre.jpeg" alt="Analog Gear">
        <img src="FX/ds1.JPG" alt="Analog Gear">
        <img src="FX/digitech-rp5.jpeg" alt="Analog Gear">
        <img src="FX/sm94.JPG" alt="Analog Gear">
        <img src="FX/CryBaby_wah.png" alt="Analog Gear">
        <img src="FX/MXR.jpeg" alt="Analog Gear">
        <img src="FX/quad.JPG" alt="Analog Gear">
        <img src="FX/mackie.jpeg" alt="Analog Gear">
    </div>

    <a href="studio.html" class="studio-button">Return to Studio</a>

</body>
</html>
